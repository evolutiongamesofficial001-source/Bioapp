<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PI Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0a0a0a;
    color:#00ff88;
}
.container { padding:15px; }

.topbar {
    font-size:18px;
    margin-bottom:10px;
}

input, button {
    width:100%;
    padding:12px;
    margin:5px 0;
    border-radius:10px;
    border:none;
}

input { background:#111; color:#0f0; }
button { background:#00ff88; color:black; font-weight:bold; }

.card {
    background:#111;
    padding:15px;
    border-radius:10px;
    margin:5px 0;
}

.msg {
    background:#003322;
    padding:10px;
    border-radius:10px;
    margin:5px 0;
}

.me {
    background:#00aa55;
    color:black;
}

img {
    max-width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="app" class="container"></div>

<script>

// 🔐 BLOQUEIO
let user = localStorage.getItem("user");

if (!user) {
    window.location.href = "registro.html";
}

// 🔥 FIREBASE
const firebaseConfig = {
  databaseURL: "https://piri-82dcf-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const app = document.getElementById("app");

let contatoAtual = "";
let chatRef = null;
let typingRef = null;

// 🟢 ONLINE
function setOnline(){
    let ref = db.ref("status/"+user);

    db.ref(".info/connected").on("value", snap=>{
        if(snap.val()){
            ref.set({online:true});
            ref.onDisconnect().set({online:false});
        }
    });
}

// 🏠 HUB
function telaHub(){

    app.innerHTML = `
        <div class="topbar">PI Chat</div>

        <div class="card">
            👤 Usuário: <b>${user}</b>
            <button onclick="verUsuario()">Ver usuário</button>
            <button onclick="irRegistro()">Trocar conta</button>
        </div>

        <button onclick="telaAdd()">Adicionar Contato</button>

        <div id="lista"></div>
    `;

    db.ref("contatos/"+user).on("value", snap=>{
        let lista = snap.val() || [];
        let html = "";

        lista.forEach(c=>{
            html += `<div class="card" onclick="abrirChat('${c}')">${c}</div>`;
        });

        document.getElementById("lista").innerHTML = html;
    });
}

// 👤 VER USUÁRIO
function verUsuario(){
    alert("Seu usuário é: " + user);
}

// 🔄 TROCAR CONTA
function irRegistro(){
    if(confirm("Deseja sair da conta?")){
        localStorage.removeItem("user");
        window.location.href = "registro.html";
    }
}

// ➕ CONTATO
function telaAdd(){
    app.innerHTML = `
        <div class="topbar">Adicionar</div>
        <input id="contato" placeholder="Nome do usuário">
        <button onclick="addContato()">Adicionar</button>
        <button onclick="telaHub()">Voltar</button>
    `;
}

function addContato(){
    let nome = document.getElementById("contato").value;

    db.ref("users").once("value", snap=>{
        let users = snap.val() || {};

        if(!Object.values(users).includes(nome)){
            alert("Usuário não existe");
            return;
        }

        db.ref("contatos/"+user).once("value", s=>{
            let lista = s.val() || [];

            if(!lista.includes(nome)) lista.push(nome);

            db.ref("contatos/"+user).set(lista);

            telaHub();
        });
    });
}

// 💬 CHAT
function abrirChat(nome){

    contatoAtual = nome;
    let chatId = [user, nome].sort().join("_");

    if(chatRef) chatRef.off();
    if(typingRef) typingRef.off();

    app.innerHTML = `
        <div class="topbar" id="topo">${nome}</div>
        <div id="msgs"></div>

        <input id="msg" placeholder="Mensagem" oninput="digitando()">
        <input type="file" id="img">

        <button onclick="enviar()">Enviar</button>
        <button onclick="telaHub()">Voltar</button>
    `;

    // status
    db.ref("status/"+nome).on("value", snap=>{
        let s = snap.val();
        document.getElementById("topo").innerText =
            nome + (s?.online ? " 🟢 Online" : " ⚫ Offline");
    });

    // digitando
    typingRef = db.ref("typing/"+chatId+"/"+nome);
    typingRef.on("value", snap=>{
        if(snap.val()){
            document.getElementById("topo").innerText =
                nome + " 🟢 digitando...";
        }
    });

    // mensagens
    chatRef = db.ref("chats/"+chatId);
    chatRef.on("value", snap=>{
        let msgs = snap.val() || {};
        let html = "";

        Object.entries(msgs).forEach(([id, m])=>{
            html += `
            <div class="msg ${m.de===user?'me':''}">
                <b>${m.de}</b><br>
                ${m.texto || ""}
                ${m.img ? `<img src="${m.img}">` : ""}
                ${m.de===user?`<br><button onclick="apagar('${id}')">Apagar</button>`:""}
            </div>
            `;
        });

        document.getElementById("msgs").innerHTML = html;
    });
}

// ⌨️ DIGITANDO
function digitando(){
    let chatId = [user, contatoAtual].sort().join("_");

    db.ref("typing/"+chatId+"/"+user).set(true);

    clearTimeout(window.t);

    window.t = setTimeout(()=>{
        db.ref("typing/"+chatId+"/"+user).set(false);
    },1000);
}

// 📤 ENVIAR
function enviar(){
    let texto = document.getElementById("msg").value;
    let file = document.getElementById("img").files[0];
    let chatId = [user, contatoAtual].sort().join("_");

    if(file){
        let reader = new FileReader();
        reader.onload = ()=>salvar(texto, reader.result);
        reader.readAsDataURL(file);
    } else {
        salvar(texto,"");
    }

    function salvar(texto,img){
        db.ref("chats/"+chatId).push({
            de:user,
            texto,
            img
        });
        document.getElementById("msg").value="";
    }
}

// 🗑️ APAGAR
function apagar(id){
    let chatId = [user, contatoAtual].sort().join("_");
    db.ref("chats/"+chatId+"/"+id).remove();
}

// 🚀 START
setOnline();
telaHub();

</script>

</body>
</html>
