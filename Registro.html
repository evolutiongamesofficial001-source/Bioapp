<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - PI</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0a0a0a;
    color:#00ff88;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:#111;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:300px;
}

input, button {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

input {
    background:#000;
    color:#0f0;
}

button {
    background:#00ff88;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
    <h2>Criar Conta</h2>
    <input id="nome" placeholder="Nome único">
    <button onclick="registrar()">Entrar</button>
</div>

<script>

const firebaseConfig = {
  databaseURL: "https://piri-82dcf-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function registrar(){
    let nome = document.getElementById("nome").value.trim();

    if(!nome) return alert("Digite um nome");

    db.ref("users").once("value", snap=>{
        let users = snap.val() || {};

        if(Object.values(users).includes(nome)){
            alert("Nome já existe!");
            return;
        }

        db.ref("users").push(nome);

        localStorage.setItem("user", nome);

        // 🔥 vai pro app
        window.location.href = "index.html";
    });
}

</script>

</body>
</html>
